[build]
  publish = "."
  command = "echo 'Static site, no build needed'"

[context.production]
  command = "echo 'Static site'"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/data.json"
  [headers.values]
    Cache-Control = "no-cache"
